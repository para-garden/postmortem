<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>postmortem</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400;1,8..60,600&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600&family=Merriweather:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;1,400&family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Space+Grotesk:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="viewport" role="application" aria-roledescription="spatial graph">
      <div id="world">
        <div id="card" hidden role="dialog" aria-label="Node details"></div>
      </div>
      <div id="bottom-bar">
        <div id="cw-bar"></div>
        <div id="filter-bar"></div>
      </div>
      <div id="grouping-bar"></div>
    </div>
    <div id="panel" hidden role="complementary" aria-label="Project details">
      <div id="panel-divider"></div>
      <div id="panel-content">
        <div id="panel-header">
          <h2 id="panel-title"></h2>
          <span id="panel-actions">
            <a id="panel-open" href="/" target="_blank" title="Open in new tab">&#x2197;</a>
            <button id="panel-close" aria-label="Close panel">&times;</button>
          </span>
        </div>
        <div id="panel-body"></div>
      </div>
    </div>
  </div>
  <div id="live-region" class="sr-only" aria-live="polite"></div>
  <script type="module" src="main.js"></script>
</body>
</html>
